{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}{{ title }} - Messages{% endblock %}

{% block content %}
<div class="container px-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="glass-card p-4 mb-4">
                <h2 class="text-glass mb-2">
                    <i class="fas fa-paper-plane me-3 text-gradient"></i>{{ title }}
                </h2>
                <p class="text-glass-muted">Send a message to connect with other learners</p>
            </div>

            <div class="glass-card p-4">
                <form method="post">
                    {% csrf_token %}
                    {% crispy form %}
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
