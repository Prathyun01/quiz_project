{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}Conversation Settings - Messages{% endblock %}

{% block content %}
<div class="container px-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="glass-card p-4 mb-4">
                <h3 class="text-glass mb-2">
                    <i class="fas fa-cog me-3 text-gradient"></i>Conversation Settings
                </h3>
                <p class="text-glass-muted">{{ conversation }}</p>
            </div>

            <div class="glass-card p-4">
                <form method="post">
                    {% csrf_token %}
                    {% crispy form %}
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
